<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一般常識クイズ</title>
  <!-- <link> タグ：style.css を読み込んで、このページのデザインルールを適用するという指示 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- class="container"：CSSでデザインを当てるための「名前タグ」（style.css の中で .container { ... } という形でデザインが定義されている -->
  <div class="container">

    <!-- スタート画面 -->
    <div id="start-screen" class="screen">
      <div class="icon">&#x1F4DA;</div>
      <h1>一般常識クイズ</h1>
      <p class="subtitle">全5問・4択形式<br>あなたの知識を試してみよう！</p>
      <button id="start-btn" class="btn btn-primary">スタート</button>
    </div>

    <!-- クイズ画面 -->
    <div id="quiz-screen" class="screen hidden">
      <div class="progress-area">
        <span id="question-number">問題 1 / 5</span>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <p id="question-text" class="question-text"></p>
        <div id="choices" class="choices"></div>

        <div id="feedback" class="feedback hidden">
          <p id="feedback-text" class="feedback-text"></p>
          <p id="explanation-text" class="explanation"></p>
          <button id="next-btn" class="btn btn-primary">次の問題へ</button>
        </div>
      </div>
    </div>

    <!-- 結果画面 -->
    <div id="result-screen" class="screen hidden">
      <div class="result-icon" id="result-icon"></div>
      <h2>クイズ終了！</h2>
      <div class="score-display">
        <p class="score-label">あなたのスコア</p>
        <div class="score-number">
          <span id="score">0</span>
          <span class="score-total">/ 5</span>
        </div>
        <p id="score-message" class="score-message"></p>
      </div>
      <button id="retry-btn" class="btn btn-primary">もう一度挑戦する</button>
    </div>

  </div>
  <!-- <script> タグ：script.js を読み込んで、このページの動きのロジックを適用するという指示 -->
  <script src="script.js"></script>
</body>
</html>
